version: '3.8'

services:
  postgres:
    image: postgres:latest
    restart: always
    environment:
      POSTGRES_USER: example
      POSTGRES_PASSWORD: example
      POSTGRES_DB: example_db
    ports:
      - '5432:5432'

  influxdb:
    image: influxdb:latest
    restart: always
    environment:
      INFLUXDB_DB: example_db
    ports:
      - '8086:8086'

  redis:
    image: redis:latest
    restart: always
    ports:
      - '6379:6379'